    Bridge polyfill. Same shape as the other references — kept inline until

  <script>
  window.__ikenga_bridge_polyfill__ = (function () {
    var manifest = JSON.parse(document.getElementById('ikenga-manifest').textContent);
    var mock = JSON.parse(document.getElementById('ikenga-mock-data').textContent);
    var hostKind = window.__ikenga_host__ ? 'ikenga' : 'browser';
    var cache = {}, subs = {}, usedFallback = {};

    function resolve(name) {
      var def = manifest.dataSources[name];
      if (def && def.type === 'fetch') {
        return fetch(def.url).then(function (r) {
          if (!r.ok) throw new Error('http ' + r.status);
          return r.json();
        }).then(function (d) { usedFallback[name] = false; return d; })
          .catch(function () { usedFallback[name] = true; return mock[name]; });
      }
      usedFallback[name] = true;
      return Promise.resolve(mock[name]);
    }

    return {
      init: function () {
        var keys = Object.keys(manifest.dataSources);
        return Promise.all(keys.map(function (k) {
          return resolve(k).then(function (v) { cache[k] = v; });
        })).then(function () {
          return {
            host: {
              kind: hostKind,
              user: null,
              usedFallback: function (n) { return !!usedFallback[n]; },
              anyFallback: function () { return Object.keys(usedFallback).some(function (k) { return usedFallback[k]; }); },
            },
            source: function (name) {
              return {
                get: function () { return cache[name]; },
                subscribe: function (fn) {
                  if (!subs[name]) subs[name] = [];
                  subs[name].push(fn);
                  return function () { subs[name] = subs[name].filter(function (f) { return f !== fn; }); };
                },
                refresh: function () {
                  return resolve(name).then(function (v) {
                    cache[name] = v;
                    (subs[name] || []).forEach(function (fn) { fn(v); });
                  });
                },
              };
            },
            state: {
              get: function (k) {
                try { return JSON.parse(localStorage.getItem('ikenga:' + manifest.id + ':' + k)); }
                catch (e) { return null; }
              },
              set: function (k, v) { localStorage.setItem('ikenga:' + manifest.id + ':' + k, JSON.stringify(v)); },
              subscribe: function () { return function () {}; },
            },
            notes: { send: function (t, o) { console.log('[ikenga.notes]', t, o || {}); } },
            pin: function () {},
          };
        });
      }
    };
  })();

  <script type="text/babel" data-presets="env,react">
    (function () {
      const { useState, useEffect, useRef } = React;

      function useSource(art, name) {
        const [v, setV] = useState(() => art.source(name).get());
        useEffect(() => art.source(name).subscribe(setV), [art, name]);
        return v;
      }

      // ── small components ───────────────────────────────────────

      // Renders a string with `[^id]` markers as superscript citation links
      // that jump to the bibliography. Numbers are derived from biblio order.
      const BiblioCtx = React.createContext([]);
      function Cited({ children }) {
        const biblio = React.useContext(BiblioCtx);
        const text = typeof children === 'string' ? children : '';
        if (!text || !biblio.length) return <>{children}</>;
        const re = /\[\^([a-z0-9-]+)\]/g;
        const out = [];
        let last = 0, m, key = 0;
        while ((m = re.exec(text)) !== null) {
          if (m.index > last) out.push(text.slice(last, m.index));
          const id = m[1];
          const idx = biblio.findIndex((b) => b.id === id);
          if (idx >= 0) {
            const n = idx + 1;
            out.push(
              <sup key={key++} className="ml-0.5">
                <a
                  href={`#bib-${id}`}
                  className="brick mono text-[10px] no-underline hover:underline"
                  title={biblio[idx].source}
                >[{n}]</a>
              </sup>
            );
          }
          last = m.index + m[0].length;
        }
        if (last < text.length) out.push(text.slice(last));
        return <>{out}</>;
      }

      function DottedRule({ className = '' }) {
        return <div className={`dotted-rule my-6 ${className}`} />;
      }

      function Marginalia({ children, className = '' }) {
        return (
          <aside className={`margin-note margin-arrow ${className}`}>
            {children}
          </aside>
        );
      }

      function Plate({ src, alt, caption, credit, sourceUrl, className = '' }) {
        const [open, setOpen] = useState(false);
        return (
          <>
            <figure className={`plate ${className}`}>
              <button
                onClick={() => setOpen(true)}
                className="block w-full focus:outline-none"
                aria-label={`Enlarge ${alt}`}
              >
                <img src={src} alt={alt} loading="lazy" />
              </button>
              <figcaption className="mt-3 px-1 pb-1 flex items-baseline justify-between gap-4 text-xs">
                <span className="display ink"><Cited>{caption}</Cited></span>
                {sourceUrl ? (
                  <a
                    href={sourceUrl}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="mono ink-soft italic no-underline hover:text-[var(--brick)] hover:underline"
                    title="View source on Wikimedia Commons"
                  >{credit} ↗</a>
                ) : (
                  <span className="mono ink-soft italic">{credit}</span>
                )}
              </figcaption>
            </figure>
            {open && (
              <div
                onClick={() => setOpen(false)}
                className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-6 cursor-zoom-out"
                role="dialog"
                aria-label={alt}
              >
                <img src={src} alt={alt} className="max-h-[90vh] max-w-[90vw] shadow-2xl" />
              </div>
            )}
          </>
        );
      }

      function SectionHeader({ number, eyebrow, title }) {
        return (
          <header className="mb-8">
            <div className="flex items-baseline gap-4 mb-3">
              <span className="number text-2xl">{number}</span>
              <span className="eyebrow">{eyebrow}</span>
            </div>
            <h2 className="display text-3xl md:text-4xl font-normal ink leading-tight">
              {title}
            </h2>
          </header>
        );
      }

      // ── section bodies ─────────────────────────────────────────

      function IntroSection({ s }) {
        return (
          <section id={s.id} className="grid md:grid-cols-12 gap-x-10 gap-y-6 scroll-mt-24">
            <div className="md:col-span-7 md:col-start-1">
              <SectionHeader number={s.number} eyebrow={s.eyebrow} title={s.title} />
              <p className="lede text-lg leading-relaxed"><Cited>{s.lede}</Cited></p>
              <DottedRule />
              <ol className="space-y-5">
                {s.facets.map((f, i) => (
                  <li key={f.label} className="flex gap-4">
                    <span className="number mt-1.5 text-sm shrink-0 w-6">{String(i + 1).padStart(2, '0')}</span>
                    <div>
                      <div className="eyebrow mb-1.5">{f.label}</div>
                      <p className="text-base leading-relaxed"><Cited>{f.text}</Cited></p>
                    </div>
                  </li>
                ))}
              </ol>
            </div>
            <div className="md:col-span-4 md:col-start-9 md:row-start-1 space-y-4">
              <Plate
                src={s.image.url}
                alt={s.image.caption}
                caption={s.image.caption}
                credit={s.image.credit}
                sourceUrl={s.image.sourceUrl}
              />
              <Marginalia>{s.marginalia}</Marginalia>
            </div>
          </section>
        );
      }

      function EtymologySection({ s }) {
        return (
          <section id={s.id} className="scroll-mt-24">
            <SectionHeader number={s.number} eyebrow={s.eyebrow} title={s.title} />
            <div className="grid md:grid-cols-12 gap-x-10 gap-y-8 items-start">
              <div className="md:col-span-7">
                <div className="border border-rule bg-paper-2/40 p-6 md:p-8">
                  <div className="grid grid-cols-2 gap-6 items-baseline">
                    {s.etymology.map((e, i) => (
                      <div key={e.word}>
                        <div className="display text-3xl ink mb-1">{e.word}</div>
                        <div className="eyebrow mb-3">{e.gloss}</div>
                        <p className="text-sm ink-soft leading-relaxed">{e.sub}</p>
                      </div>
                    ))}
                  </div>
                  <div className="dotted-rule my-6" />
                  <div className="text-center">
                    <span className="display ink-soft text-sm mr-3">=</span>
                    <span className="display text-xl ink">"{s.equation}"</span>
                  </div>
                </div>
                <p className="lede text-lg leading-relaxed mt-8"><Cited>{s.lede}</Cited></p>
              </div>
              <div className="md:col-span-4 md:col-start-9">
                <Marginalia>{s.marginalia}</Marginalia>
              </div>
            </div>
          </section>
        );
      }

      function SymbolismSection({ s }) {
        const [active, setActive] = useState(s.annotations[0].id);
        const current = s.annotations.find((a) => a.id === active) || s.annotations[0];
        return (
          <section id={s.id} className="scroll-mt-24">
            <SectionHeader number={s.number} eyebrow={s.eyebrow} title={s.title} />
            <p className="lede text-lg leading-relaxed mb-10 max-w-3xl"><Cited>{s.lede}</Cited></p>
            <div className="grid md:grid-cols-12 gap-x-10 gap-y-6 items-start">
              <div className="md:col-span-6 relative">
                <Plate
                  src={s.image.url}
                  alt={s.image.caption}
                  caption={s.image.caption}
                  credit={s.image.credit}
                  sourceUrl={s.image.sourceUrl}
                />
                {s.annotations.map((a, i) => (
                  <button
                    key={a.id}
                    onClick={() => setActive(a.id)}
                    className="absolute left-2 transition-transform hover:scale-110"
                    style={{ top: a.top }}
                    aria-label={a.part}
                  >
                    <span className={`pin ${active === a.id ? 'bg-[var(--brick)] text-[var(--paper)]' : ''}`}>{i + 1}</span>
                  </button>
                ))}
              </div>
              <div className="md:col-span-6 space-y-4">
                {s.annotations.map((a, i) => (
                  <button
                    key={a.id}
                    onClick={() => setActive(a.id)}
                    className={`block w-full text-left border-l-2 pl-5 py-2 transition-colors ${
                      active === a.id ? 'border-[var(--brick)]' : 'border-rule hover:border-[var(--brick-2)]'
                    }`}
                  >
                    <div className="flex items-baseline gap-3 mb-1">
                      <span className="pin" style={{ width: 18, height: 18, fontSize: 9 }}>{i + 1}</span>
                      <h3 className="display text-lg ink">{a.part}</h3>
                    </div>
                    <p className={`text-sm leading-relaxed ${active === a.id ? 'ink' : 'ink-soft'}`}><Cited>{a.text}</Cited></p>
                  </button>
                ))}
              </div>
            </div>
          </section>
        );
      }

      function FormsSection({ s }) {
        const [active, setActive] = useState(s.forms[0].key);
        const current = s.forms.find((f) => f.key === active) || s.forms[0];
        return (
          <section id={s.id} className="scroll-mt-24">
            <SectionHeader number={s.number} eyebrow={s.eyebrow} title={s.title} />
            <p className="lede text-lg leading-relaxed max-w-3xl mb-8"><Cited>{s.lede}</Cited></p>

            {/* Tabs */}
            <div className="flex gap-0 border-b border-rule mb-8">
              {s.forms.map((f) => (
                <button
                  key={f.key}
                  onClick={() => setActive(f.key)}
                  className={`px-5 py-3 -mb-px border-b-2 transition-colors ${
                    active === f.key ? 'border-[var(--brick)] text-[var(--ink)]' : 'border-transparent ink-soft hover:text-[var(--ink)]'
                  }`}
                >
                  <div className="display text-base mb-0.5">{f.name}</div>
                  <div className="text-[10px] uppercase tracking-widest ink-soft">{f.subtitle}</div>
                </button>
              ))}
            </div>

            <div className="grid md:grid-cols-12 gap-x-10 gap-y-6 items-start">
              <div className="md:col-span-5">
                <Plate
                  src={current.image}
                  alt={current.name}
                  caption={`${current.name} · ${current.subtitle}`}
                  credit={current.credit}
                  sourceUrl={current.sourceUrl}
                />
              </div>
              <div className="md:col-span-6 md:col-start-7">
                <div className="number text-2xl mb-2">{s.forms.findIndex(f => f.key === active) + 1}/3</div>
                <h3 className="display text-2xl ink mb-1">{current.name}</h3>
                <div className="eyebrow mb-5">{current.subtitle}</div>
                <p className="text-base leading-relaxed"><Cited>{current.text}</Cited></p>
                <Marginalia className="mt-6">{s.marginalia}</Marginalia>
              </div>
            </div>
          </section>
        );
      }

      function CultureSection({ s }) {
        return (
          <section id={s.id} className="scroll-mt-24">
            <SectionHeader number={s.number} eyebrow={s.eyebrow} title={s.title} />
            <div className="grid md:grid-cols-12 gap-x-10 gap-y-10">
              <div className="md:col-span-5">
                <Plate
                  src={s.image.url}
                  alt={s.image.caption}
                  caption={s.image.caption}
                  credit={s.image.credit}
                  sourceUrl={s.image.sourceUrl}
                />
              </div>
              <div className="md:col-span-7 space-y-10">
                <div>
                  <h3 className="display text-lg ink mb-1">{s.ritual.title}</h3>
                  <div className="dotted-rule mb-4" />
                  <dl className="space-y-4">
                    {s.ritual.items.map((it) => (
                      <div key={it.name} className="grid grid-cols-12 gap-4">
                        <dt className="col-span-4 eyebrow pt-1">{it.name}</dt>
                        <dd className="col-span-8 text-sm leading-relaxed"><Cited>{it.text}</Cited></dd>
                      </div>
                    ))}
                  </dl>
                </div>
                <div>
                  <h3 className="display text-lg ink mb-1">{s.values.title}</h3>
                  <div className="dotted-rule mb-4" />
                  <ul className="grid grid-cols-2 gap-x-6 gap-y-4">
                    {s.values.items.map((v) => (
                      <li key={v.name}>
                        <div className="display text-base ink">{v.name}</div>
                        <div className="text-sm ink-soft leading-snug">{v.text}</div>
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            </div>
          </section>
        );
      }

      function LegacySection({ s }) {
        return (
          <section id={s.id} className="scroll-mt-24">
            <SectionHeader number={s.number} eyebrow={s.eyebrow} title={s.title} />
            <div className="grid md:grid-cols-12 gap-x-10 gap-y-10 items-start">
              <div className="md:col-span-7">
                <p className="lede text-lg leading-relaxed"><Cited>{s.lede}</Cited></p>
                <DottedRule />
                <div className="space-y-6">
                  {s.sites.map((site, i) => (
                    <div key={site.label} className="grid grid-cols-12 gap-4">
                      <div className="col-span-3">
                        <span className="number text-sm">{String(i + 1).padStart(2, '0')}</span>
                        <div className="eyebrow mt-1">{site.label}</div>
                      </div>
                      <p className="col-span-9 text-base leading-relaxed"><Cited>{site.text}</Cited></p>
                    </div>
                  ))}
                </div>
              </div>
              <div className="md:col-span-4 md:col-start-9">
                <Plate
                  src={s.image.url}
                  alt={s.image.caption}
                  caption={s.image.caption}
                  credit={s.image.credit}
                  sourceUrl={s.image.sourceUrl}
                />
              </div>
            </div>
          </section>
        );
      }

      // ── Bibliography (Further Reading) ────────────────────────

      function Bibliography({ biblio }) {
        if (!biblio || !biblio.length) return null;
        return (
          <section id="bibliography" className="scroll-mt-24 mt-24">
            <header className="mb-8">
              <div className="flex items-baseline gap-4 mb-3">
                <span className="number text-2xl">07</span>
                <span className="eyebrow">FURTHER READING</span>
              </div>
              <h2 className="display text-3xl md:text-4xl font-normal ink leading-tight">
                Sources &amp; citations
              </h2>
              <p className="mt-3 ink-soft text-sm leading-relaxed max-w-2xl">
                Every numbered marker in the body links here. Museum entries point at the catalogued figure; encyclopaedic sources give the broader frame.
              </p>
            </header>
            <ol className="space-y-3">
              {biblio.map((b, i) => (
                <li
                  key={b.id}
                  id={`bib-${b.id}`}
                  className="grid grid-cols-12 gap-4 py-3 border-t border-rule"
                >
                  <div className="col-span-1 number text-sm pt-0.5">[{i + 1}]</div>
                  <div className="col-span-11">
                    <a
                      href={b.url}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="display text-base ink hover:text-[var(--brick)]"
                    >{b.title} ↗</a>
                    <div className="eyebrow mt-0.5">{b.source}</div>
                    {b.note && (
                      <p className="text-sm ink-soft mt-1 leading-relaxed">{b.note}</p>
                    )}
                  </div>
                </li>
              ))}
            </ol>
          </section>
        );
      }

      const SECTION_COMPONENTS = {
        intro: IntroSection,
        etymology: EtymologySection,
        symbolism: SymbolismSection,
        forms: FormsSection,
        culture: CultureSection,
        legacy: LegacySection,
      };

      // ── chapter index (sticky left rail on desktop) ───────────

      function ChapterRail({ sections, hasBiblio }) {
        const allIds = hasBiblio ? [...sections.map((s) => s.id), 'bibliography'] : sections.map((s) => s.id);
        const [active, setActive] = useState(allIds[0]);
        useEffect(() => {
          if (!('IntersectionObserver' in window)) return;
          const els = allIds.map((id) => document.getElementById(id)).filter(Boolean);
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) setActive(e.target.id);
              });
            },
            { rootMargin: '-30% 0px -55% 0px', threshold: 0.01 }
          );
          els.forEach((el) => obs.observe(el));
          return () => obs.disconnect();
        }, [sections, hasBiblio]);

        return (
          <nav
            aria-label="Chapter index"
            className="hidden lg:flex flex-col gap-2 text-[11px] ink-soft sticky top-12"
          >
            <div className="eyebrow mb-2">Field index</div>
            {sections.map((s) => (
              <a
                key={s.id}
                href={`#${s.id}`}
                className={`flex items-baseline gap-3 py-1 transition-colors ${
                  active === s.id ? 'ink' : 'hover:text-[var(--ink)]'
                }`}
              >
                <span className="number text-xs">{s.number}</span>
                <span className="display">{s.title}</span>
                {active === s.id && <span className="ml-auto brick">·</span>}
              </a>
            ))}
            {hasBiblio && (
              <a
                href="#bibliography"
                className={`flex items-baseline gap-3 py-1 transition-colors ${
                  active === 'bibliography' ? 'ink' : 'hover:text-[var(--ink)]'
                }`}
              >
                <span className="number text-xs">07</span>
                <span className="display">Sources</span>
                {active === 'bibliography' && <span className="ml-auto brick">·</span>}
              </a>
            )}
          </nav>
        );
      }

      // ── App ───────────────────────────────────────────────────

      function App({ art }) {
        const content = useSource(art, 'content');
        const fallback = art.host.usedFallback('content');
        const sections = content?.sections || [];
        const meta = content?.meta || {};
        const colophon = content?.colophon || {};
        const biblio = content?.bibliography || [];

        return (
          <BiblioCtx.Provider value={biblio}>
          <div className="min-h-screen">
            {fallback && (
              <div className="bridge-banner sticky top-0 z-40 border-b border-rule bg-[var(--paper-2)] px-6 py-2 ink-soft flex items-center gap-3">
                <span className="brick">●</span>
                <span>Standalone preview — open in the Ikenga shell to comment + edit via AI.</span>
                <span className="ml-auto ink-soft">host: <span className="mono">{art.host.kind}</span></span>
              </div>
            )}

            {/* Masthead */}
            <header className="border-b border-rule">
              <div className="max-w-6xl mx-auto px-6 lg:px-12 pt-16 pb-10 grid grid-cols-12 gap-x-10">
                <div className="col-span-12 lg:col-span-9 lg:col-start-2">
                  <div className="flex items-baseline justify-between mb-10">
                    <span className="eyebrow">{meta.eyebrow}</span>
                    <span className="eyebrow">{meta.dateline}</span>
                  </div>
                  <h1 className="display text-[clamp(3rem,8vw,6rem)] leading-[0.95] mb-4">
                    {meta.title}
                  </h1>
                  <p className="text-xl md:text-2xl ink-soft max-w-3xl italic leading-snug">
                    {meta.subtitle}
                  </p>
                  <div className="dotted-rule my-8" />
                  <div className="flex items-baseline justify-between text-xs">
                    <span className="display ink">{meta.byline}</span>
                    <span className="hand brick text-base" style={{ transform: 'rotate(-2deg)', display: 'inline-block' }}>
                      ↳ {meta.kicker}
                    </span>
                  </div>
                </div>
              </div>
            </header>

            {/* Body */}
            <main className="max-w-6xl mx-auto px-6 lg:px-12 py-16 grid grid-cols-12 gap-x-10">
              <div className="hidden lg:block lg:col-span-2">
                <ChapterRail sections={sections} hasBiblio={biblio.length > 0} />
              </div>
              <div className="col-span-12 lg:col-span-9 lg:col-start-4 space-y-24">
                {sections.map((s, i) => {
                  const Cmp = SECTION_COMPONENTS[s.id] || IntroSection;
                  return (
                    <React.Fragment key={s.id}>
                      <Cmp s={s} />
                      {i < sections.length - 1 && <div className="dotted-rule my-2" />}
                    </React.Fragment>
                  );
                })}
                {biblio.length > 0 && (
                  <>
                    <div className="dotted-rule my-2" />
                    <Bibliography biblio={biblio} />
                  </>
                )}
              </div>
            </main>

            {/* Colophon */}
            <footer className="border-t border-rule mt-12">
              <div className="max-w-6xl mx-auto px-6 lg:px-12 py-12 grid md:grid-cols-2 gap-8 text-xs ink-soft">
                <div>
                  <div className="eyebrow mb-2">Colophon</div>
                  <p className="leading-relaxed">{colophon.left}</p>
                </div>
                <div>
                  <div className="eyebrow mb-2">About this artifact</div>
                  <p className="leading-relaxed">{colophon.right}</p>
                </div>
              </div>
              <div className="border-t border-rule">
                <div className="max-w-6xl mx-auto px-6 lg:px-12 py-4 flex items-baseline justify-between text-[11px] ink-soft">
                  <span className="display">Ikenga artifact · v0.1 · ikenga-symbol</span>
                  <span className="mono">single-file HTML · {Math.round((document.documentElement.outerHTML.length || 0) / 1024)} KB</span>
                </div>
              </div>
            </footer>
          </div>
          </BiblioCtx.Provider>
        );
      }

      window.__ikenga_bridge_polyfill__.init().then(function (art) {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App art={art} />);
      }).catch(function (err) {
        document.getElementById('root').innerHTML =
          '<pre style="padding:2rem;color:#b91c1c;font-family:ui-monospace,monospace;white-space:pre-wrap">'
          + 'Init failed: ' + (err && err.message ? err.message : String(err))
          + '</pre>';
        console.error('[ikenga] init failed', err);
      });
    })();
  </script>
</body>
</html>
